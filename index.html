<script>
var sum1 = +prompt("Enter first number");
var sum2 = +prompt("Enter second number");
var ope = prompt("Choose an operator: +, -, x, %");

function calculator(num1, operator, num2) {
  let result;

  if (operator === "+") {
    result = num1 + num2;
  } else if (operator === "-") {
    result = num1 - num2;
  } else if (operator === "x" || operator === "*") {
    result = num1 * num2;
  } else if (operator === "%") {
    result = num1 % num2;
  } else {
    return "Invalid operator!";
  }

  return `Result: ${result}`;
}

console.log(calculator(sum1, ope, sum2));
</script>
