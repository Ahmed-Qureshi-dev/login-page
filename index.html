<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="firebase.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
</head>
<body>

<div class="login-box">
    <h2>Login</h2>

    <form>
        <input type="email" id="semail" placeholder="Email" autocomplete="off">
        <input type="password" id="spassword" placeholder="Password" autocomplete="off">

        <button id="signupbtn" type="submit">signup</button>
    </form>

    <form>
        <input type="email" id="lemail" placeholder="Email" required>
        <input type="password" id="lpassword" placeholder="Password" required>

        <button id="loginbtn" type="submit">login</button>
    </form>

    <p class="register">
        Don't have an account? <a href="#">Register</a>
    </p>
    <p  id="text" ></p>
</div>


<script type="module" src="firebase.js"></script>

</body>
</html>
