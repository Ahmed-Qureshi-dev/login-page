<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="firebase.css">
</head>
<body>

<div class="login-box">
    <h2>Login</h2>

    <form>
        <input type="email" id="semail" placeholder="Email" required>
        <input type="password" id="spassword" placeholder="Password" required>

        <button id="signupbtn" type="submit">signup</button>
    </form>

    <p class="register">
        Don't have an account? <a href="#">Register</a>
    </p>
</div>

<script type="module" src="firebase.js"></script>

</body>
</html>
